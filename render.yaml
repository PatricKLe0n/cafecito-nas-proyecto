# Blueprint de despliegue para Render (https://render.com).
# Crea un servicio web (el backend, que también sirve el frontend) y una base de datos
# PostgreSQL, y conecta una con otra mediante variables de entorno.
services:
  - type: web
    name: cafecito-nas-proyecto
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: cafecito-nas-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cafecito-nas-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cafecito-nas-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cafecito-nas-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cafecito-nas-db
          property: password

databases:
  - name: cafecito-nas-db
    plan: free
    databaseName: cafe_trazabilidad
    user: cafe
